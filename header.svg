<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f78166"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3"/>
      <stop offset="100%" style="stop-color:#c9d1d9"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.15; r: 3; }
      50% { opacity: 0.6; r: 4.5; }
    }
    @keyframes pulseSlow {
      0%, 100% { opacity: 0.1; r: 2; }
      50% { opacity: 0.4; r: 3; }
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes shimmer {
      0% { opacity: 0.4; }
      50% { opacity: 0.8; }
      100% { opacity: 0.4; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes accentScroll {
      0% { x: -400; }
      100% { x: 1200; }
    }
    @keyframes lineGrow {
      0% { width: 0; }
      100% { width: 160; }
    }
    @keyframes dotTravel {
      0% { cx: 60; cy: 70; opacity: 0; }
      20% { opacity: 0.7; }
      100% { cx: 200; cy: 30; opacity: 0; }
    }
    .node { animation: pulse 3s ease-in-out infinite; }
    .node-slow { animation: pulseSlow 4s ease-in-out infinite; }
    .chart-path {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: drawLine 3s ease-out forwards;
    }
    .title { animation: fadeSlideUp 1s ease-out 0.3s both; }
    .subtitle { animation: fadeSlideUp 1s ease-out 0.6s both; }
    .stats { animation: fadeSlideUp 1s ease-out 0.9s both; }
    .location { animation: fadeSlideUp 1s ease-out 1.1s both; }
    .shimmer { animation: shimmer 3s ease-in-out infinite; }
    .float1 { animation: float 5s ease-in-out infinite; }
    .float2 { animation: float 5s ease-in-out 1.5s infinite; }
    .float3 { animation: float 5s ease-in-out 3s infinite; }
    .dot-travel { animation: dotTravel 4s ease-in-out infinite; }
    .dot-travel2 { animation: dotTravel 4s ease-in-out 2s infinite; }
  </style>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- Animated top accent -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.8"/>
  <rect class="shimmer" x="0" y="0" width="300" height="2" fill="url(#accent)" opacity="0.5" rx="1">
    <animate attributeName="x" from="-300" to="1200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Left data network — animated nodes -->
  <g>
    <!-- Connections -->
    <line x1="80" y1="70" x2="150" y2="100" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
    <line x1="80" y1="70" x2="120" y2="45" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
    <line x1="120" y1="45" x2="190" y2="55" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
    <line x1="150" y1="100" x2="190" y2="55" stroke="#58a6ff" stroke-width="0.5" opacity="0.12"/>
    <line x1="60" y1="130" x2="80" y2="70" stroke="#58a6ff" stroke-width="0.5" opacity="0.1"/>
    <line x1="60" y1="130" x2="150" y2="100" stroke="#58a6ff" stroke-width="0.5" opacity="0.1"/>
    <!-- Nodes -->
    <circle class="node float1" cx="80" cy="70" r="3" fill="#58a6ff" filter="url(#glow)" style="animation-delay: 0s"/>
    <circle class="node float2" cx="150" cy="100" r="2.5" fill="#58a6ff" filter="url(#glow)" style="animation-delay: 0.8s"/>
    <circle class="node-slow float3" cx="120" cy="45" r="2" fill="#58a6ff" style="animation-delay: 1.5s"/>
    <circle class="node float1" cx="190" cy="55" r="2" fill="#58a6ff" style="animation-delay: 0.5s"/>
    <circle class="node-slow float2" cx="60" cy="130" r="2.5" fill="#58a6ff" style="animation-delay: 2s"/>
    <!-- Traveling dots -->
    <circle class="dot-travel" cx="80" cy="70" r="1.2" fill="#58a6ff" opacity="0"/>
  </g>

  <!-- Right data network — animated nodes -->
  <g>
    <line x1="1020" y1="220" x2="1080" y2="250" stroke="#f78166" stroke-width="0.5" opacity="0.15"/>
    <line x1="1020" y1="220" x2="1100" y2="195" stroke="#f78166" stroke-width="0.5" opacity="0.15"/>
    <line x1="1080" y1="250" x2="1140" y2="230" stroke="#f78166" stroke-width="0.5" opacity="0.12"/>
    <line x1="1100" y1="195" x2="1140" y2="230" stroke="#f78166" stroke-width="0.5" opacity="0.12"/>
    <line x1="1060" y1="175" x2="1020" y2="220" stroke="#f78166" stroke-width="0.5" opacity="0.1"/>
    <line x1="1060" y1="175" x2="1100" y2="195" stroke="#f78166" stroke-width="0.5" opacity="0.1"/>
    <circle class="node float2" cx="1020" cy="220" r="3" fill="#f78166" filter="url(#glow)" style="animation-delay: 0.3s"/>
    <circle class="node-slow float3" cx="1080" cy="250" r="2" fill="#f78166" style="animation-delay: 1s"/>
    <circle class="node float1" cx="1100" cy="195" r="2.5" fill="#f78166" filter="url(#glow)" style="animation-delay: 1.8s"/>
    <circle class="node float2" cx="1140" cy="230" r="2" fill="#f78166" style="animation-delay: 0.7s"/>
    <circle class="node-slow float3" cx="1060" cy="175" r="2.5" fill="#f78166" style="animation-delay: 2.2s"/>
    <circle class="dot-travel2" cx="1020" cy="220" r="1.2" fill="#f78166" opacity="0"/>
  </g>

  <!-- Animated mini chart (right side) -->
  <g transform="translate(980, 50)">
    <line x1="0" y1="55" x2="130" y2="55" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="35" x2="130" y2="35" stroke="#21262d" stroke-width="0.3" stroke-dasharray="3,3"/>
    <line x1="0" y1="15" x2="130" y2="15" stroke="#21262d" stroke-width="0.3" stroke-dasharray="3,3"/>
    <polyline class="chart-path" points="0,50 20,42 40,45 55,28 70,32 85,18 100,22 115,10 130,14" fill="none" stroke="url(#chartLine)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chart end dot -->
    <circle cx="130" cy="14" r="2.5" fill="#3fb950" opacity="0">
      <animate attributeName="opacity" from="0" to="0.8" begin="2.5s" dur="0.5s" fill="freeze"/>
    </circle>
  </g>

  <!-- Animated mini bar chart (left bottom) -->
  <g transform="translate(50, 200)" opacity="0.12">
    <rect x="0" y="30" width="8" height="0" fill="#58a6ff" rx="1">
      <animate attributeName="height" from="0" to="20" begin="1s" dur="0.5s" fill="freeze"/>
      <animate attributeName="y" from="30" to="10" begin="1s" dur="0.5s" fill="freeze"/>
    </rect>
    <rect x="12" y="30" width="8" height="0" fill="#58a6ff" rx="1">
      <animate attributeName="height" from="0" to="30" begin="1.2s" dur="0.5s" fill="freeze"/>
      <animate attributeName="y" from="30" to="0" begin="1.2s" dur="0.5s" fill="freeze"/>
    </rect>
    <rect x="24" y="30" width="8" height="0" fill="#58a6ff" rx="1">
      <animate attributeName="height" from="0" to="15" begin="1.4s" dur="0.5s" fill="freeze"/>
      <animate attributeName="y" from="30" to="15" begin="1.4s" dur="0.5s" fill="freeze"/>
    </rect>
    <rect x="36" y="30" width="8" height="0" fill="#3fb950" rx="1">
      <animate attributeName="height" from="0" to="25" begin="1.6s" dur="0.5s" fill="freeze"/>
      <animate attributeName="y" from="30" to="5" begin="1.6s" dur="0.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Main text — animated -->
  <text class="title" x="600" y="120" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="54" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">
    Janmejoy Kar
  </text>

  <text class="subtitle" x="600" y="168" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#8b949e" letter-spacing="4">
    DATA SCIENTIST  ·  DATA ENGINEER  ·  ANALYTICS ARCHITECT
  </text>

  <!-- Animated divider -->
  <rect class="shimmer" x="520" y="190" width="160" height="1.5" fill="url(#accent)" opacity="0.6" rx="0.75"/>

  <text class="stats" x="600" y="225" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#58a6ff" letter-spacing="1">
    7x CERTIFIED  ·  $5M+ IMPACT  ·  PUBLISHED RESEARCHER  ·  SPEAKER
  </text>

  <text class="location" x="600" y="260" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#484f58">
    Group O  ·  University of North Texas  ·  M.S. Business Analytics
  </text>

  <!-- Bottom accent -->
  <rect x="0" y="318" width="1200" height="2" fill="url(#accent)" opacity="0.4"/>
  <rect class="shimmer" x="0" y="318" width="300" height="2" fill="url(#accent)" opacity="0.3" rx="1" style="animation-delay: 2s">
    <animate attributeName="x" from="1200" to="-300" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
