<svg xmlns="http://www.w3.org/2000/svg" width="800" height="8" viewBox="0 0 800 8">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#bc8cff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="100" y="3.5" width="600" height="1" fill="url(#lineGrad)" opacity="0.3" rx="0.5"/>
  <rect x="0" y="2.5" width="120" height="3" fill="url(#pulseGrad)" opacity="0.8" rx="1.5">
    <animate attributeName="x" from="-120" to="800" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
