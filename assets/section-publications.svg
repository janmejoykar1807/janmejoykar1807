<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#3fb950;stop-opacity:0"/></linearGradient>
    <linearGradient id="pf" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#58a6ff"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#3fb950;stop-opacity:0"/></linearGradient>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes pg{0%{stroke-dashoffset:120}100%{stroke-dashoffset:0}}
    @keyframes fl{0%,100%{opacity:.3}50%{opacity:.9}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
    .pg{animation:pg 1.2s ease-out 0.5s both}
    .fl{animation:fl 2.5s ease-in-out infinite}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- Open book icon -->
  <g transform="translate(18,12)">
    <!-- Left page -->
    <path d="M50,15 Q30,15 15,22 L15,95 Q30,88 50,90 Z" fill="none" stroke="#3fb950" stroke-width="2" opacity=".3"/>
    <!-- Right page -->
    <path d="M50,15 Q70,15 85,22 L85,95 Q70,88 50,90 Z" fill="none" stroke="#58a6ff" stroke-width="2" opacity=".3"/>
    <!-- Spine -->
    <line x1="50" y1="15" x2="50" y2="90" stroke="#e6edf3" stroke-width="1.5" opacity=".2"/>
    <!-- Animated page fill left -->
    <clipPath id="lp"><path d="M50,15 Q30,15 15,22 L15,95 Q30,88 50,90 Z"/></clipPath>
    <g clip-path="url(#lp)"><rect x="15" y="93" width="35" height="80" fill="url(#pf)" opacity=".18"><animate attributeName="y" from="93" to="15" begin=".4s" dur="1.4s" fill="freeze"/></rect></g>
    <!-- Animated page fill right -->
    <clipPath id="rp"><path d="M50,15 Q70,15 85,22 L85,95 Q70,88 50,90 Z"/></clipPath>
    <g clip-path="url(#rp)"><rect x="50" y="93" width="35" height="80" fill="url(#pf)" opacity=".12"><animate attributeName="y" from="93" to="15" begin=".7s" dur="1.4s" fill="freeze"/></rect></g>
    <!-- Lines on left page -->
    <line class="fl" x1="22" y1="38" x2="46" y2="35" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity=".5" style="animation-delay:0s"/>
    <line class="fl" x1="22" y1="50" x2="46" y2="48" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity=".4" style="animation-delay:.3s"/>
    <line class="fl" x1="22" y1="62" x2="46" y2="60" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity=".3" style="animation-delay:.6s"/>
    <line class="fl" x1="22" y1="74" x2="40" y2="72" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity=".2" style="animation-delay:.9s"/>
    <!-- Lines on right page -->
    <line class="fl" x1="54" y1="35" x2="78" y2="38" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity=".5" style="animation-delay:.2s"/>
    <line class="fl" x1="54" y1="48" x2="78" y2="50" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity=".4" style="animation-delay:.5s"/>
    <line class="fl" x1="54" y1="60" x2="78" y2="62" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity=".3" style="animation-delay:.8s"/>
    <line class="fl" x1="54" y1="72" x2="72" y2="74" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity=".2" style="animation-delay:1.1s"/>
  </g>
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">Publications</text>
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="200" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3.5s" repeatCount="indefinite"/></rect>
</svg>
