<svg xmlns="http://www.w3.org/2000/svg" width="800" height="50" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
  </defs>
  <style>
    @keyframes bo{0%{opacity:0;transform:scaleX(0)}100%{opacity:.7;transform:scaleX(1)}}
    @keyframes bc{0%{opacity:0;transform:scaleX(0)}100%{opacity:.7;transform:scaleX(1)}}
    @keyframes bl{0%,100%{opacity:.3}50%{opacity:1}}
    @keyframes ti{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    .pt{animation:ti .6s ease-out .2s both;font-family:'SF Mono','Fira Code',monospace}
    .bk{font-family:'SF Mono','Fira Code',monospace}
    .cur{animation:bl 1s step-end infinite}
  </style>
  <!-- Code brackets animation -->
  <g transform="translate(10,8)">
    <text class="bk" x="0" y="28" font-size="28" fill="#3fb950" opacity="0" font-weight="300"><animate attributeName="opacity" from="0" to=".7" begin=".2s" dur=".3s" fill="freeze"/>{</text>
    <text class="bk" x="33" y="28" font-size="28" fill="#3fb950" opacity="0" font-weight="300"><animate attributeName="opacity" from="0" to=".7" begin=".5s" dur=".3s" fill="freeze"/>}</text>
    <!-- Blinking cursor between brackets -->
    <rect class="cur" x="20" y="10" width="2" height="18" fill="#58a6ff" rx="1" opacity="0"><animate attributeName="opacity" from="0" to="1" begin=".8s" dur=".1s" fill="freeze"/></rect>
  </g>
  <text class="pt" x="60" y="32" font-size="16" fill="#e6edf3" font-weight="600">Projects</text>
  <rect x="60" y="40" width="0" height="1.5" fill="url(#a)" rx=".75"><animate attributeName="width" from="0" to="80" begin=".4s" dur=".6s" fill="freeze"/></rect>
  <rect x="0" y="46" width="800" height="1" fill="url(#a)" opacity=".15"/>
  <rect x="0" y="46" width="100" height="1" fill="url(#p)" opacity=".6" rx=".5"><animate attributeName="x" from="-100" to="800" dur="3.2s" repeatCount="indefinite"/></rect>
</svg>
