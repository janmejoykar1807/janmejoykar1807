<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#3fb950;stop-opacity:0"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes bl{0%,100%{opacity:.2}50%{opacity:1}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
    .cur{animation:bl 1s step-end infinite}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- Large code brackets with cursor -->
  <g transform="translate(30,15)">
    <text font-family="'SF Mono','Fira Code',monospace" font-size="72" fill="#3fb950" opacity="0" font-weight="300" y="75"><animate attributeName="opacity" from="0" to=".5" begin=".2s" dur=".4s" fill="freeze"/>{</text>
    <text font-family="'SF Mono','Fira Code',monospace" font-size="72" fill="#3fb950" opacity="0" font-weight="300" x="55" y="75"><animate attributeName="opacity" from="0" to=".5" begin=".6s" dur=".4s" fill="freeze"/>}</text>
    <rect class="cur" x="42" y="22" width="3" height="50" fill="#58a6ff" rx="1.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1s" dur=".1s" fill="freeze"/></rect>
  </g>
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">Projects</text>
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="150" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <!-- Floating code symbols on the right -->
  <g transform="translate(850,20)" font-family="'SF Mono',monospace" fill="#484f58">
    <text x="0" y="30" font-size="18" opacity="0"><animate attributeName="opacity" from="0" to=".25" begin=".5s" dur=".5s" fill="freeze"/>def</text>
    <text x="60" y="55" font-size="14" opacity="0"><animate attributeName="opacity" from="0" to=".2" begin=".8s" dur=".5s" fill="freeze"/>import</text>
    <text x="140" y="35" font-size="20" opacity="0"><animate attributeName="opacity" from="0" to=".3" begin="1.1s" dur=".5s" fill="freeze"/>( )</text>
    <text x="200" y="65" font-size="16" opacity="0"><animate attributeName="opacity" from="0" to=".2" begin="1.4s" dur=".5s" fill="freeze"/>return</text>
    <text x="100" y="80" font-size="22" opacity="0"><animate attributeName="opacity" from="0" to=".25" begin="1.7s" dur=".5s" fill="freeze"/>→</text>
    <text x="290" y="40" font-size="16" opacity="0"><animate attributeName="opacity" from="0" to=".2" begin="2s" dur=".5s" fill="freeze"/>class</text>
  </g>
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3.2s" repeatCount="indefinite"/></rect>
</svg>
