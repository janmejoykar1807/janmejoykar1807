<svg xmlns="http://www.w3.org/2000/svg" width="800" height="50" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#bc8cff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
  </defs>
  <style>
    @keyframes grow{0%{height:0;y:38}100%{height:var(--h);y:var(--fy)}}
    @keyframes textIn{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    .bt{animation:textIn .6s ease-out both;font-family:'SF Mono','Fira Code',monospace}
  </style>
  <!-- Mini rising bars -->
  <g transform="translate(20,12)">
    <rect x="0" y="26" width="4" height="0" fill="#58a6ff" rx="1" opacity=".6"><animate attributeName="height" from="0" to="10" begin=".2s" dur=".4s" fill="freeze"/><animate attributeName="y" from="26" to="16" begin=".2s" dur=".4s" fill="freeze"/></rect>
    <rect x="6" y="26" width="4" height="0" fill="#58a6ff" rx="1" opacity=".7"><animate attributeName="height" from="0" to="18" begin=".35s" dur=".4s" fill="freeze"/><animate attributeName="y" from="26" to="8" begin=".35s" dur=".4s" fill="freeze"/></rect>
    <rect x="12" y="26" width="4" height="0" fill="#3fb950" rx="1" opacity=".8"><animate attributeName="height" from="0" to="26" begin=".5s" dur=".4s" fill="freeze"/><animate attributeName="y" from="26" to="0" begin=".5s" dur=".4s" fill="freeze"/></rect>
    <rect x="18" y="26" width="4" height="0" fill="#58a6ff" rx="1" opacity=".6"><animate attributeName="height" from="0" to="14" begin=".65s" dur=".4s" fill="freeze"/><animate attributeName="y" from="26" to="12" begin=".65s" dur=".4s" fill="freeze"/></rect>
    <rect x="24" y="26" width="4" height="0" fill="#bc8cff" rx="1" opacity=".7"><animate attributeName="height" from="0" to="22" begin=".8s" dur=".4s" fill="freeze"/><animate attributeName="y" from="26" to="4" begin=".8s" dur=".4s" fill="freeze"/></rect>
  </g>
  <text class="bt" x="60" y="32" font-size="16" fill="#e6edf3" font-weight="600" style="animation-delay:.3s">By the Numbers</text>
  <rect x="60" y="40" width="0" height="1.5" fill="url(#a)" rx=".75"><animate attributeName="width" from="0" to="140" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <!-- Trailing pulse -->
  <rect x="0" y="46" width="800" height="1" fill="url(#a)" opacity=".15"/>
  <rect x="0" y="46" width="100" height="1" fill="url(#p)" opacity=".6" rx=".5"><animate attributeName="x" from="-100" to="800" dur="3s" repeatCount="indefinite"/></rect>
</svg>
