<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#bc8cff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes gr{0%{transform:scaleY(0)}100%{transform:scaleY(1)}}
    @keyframes ct{0%{stroke-dashoffset:300}100%{stroke-dashoffset:0}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
    .bar{transform-origin:bottom;animation:gr .6s ease-out both}
    .ln{stroke-dasharray:300;stroke-dashoffset:300;animation:ct 2s ease-out .5s forwards}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- Animated bar chart — large and visible -->
  <g transform="translate(40,20)">
    <rect class="bar" x="0" y="20" width="18" height="60" fill="#58a6ff" rx="3" opacity=".25" style="animation-delay:.3s"/>
    <rect class="bar" x="25" y="5" width="18" height="75" fill="#58a6ff" rx="3" opacity=".35" style="animation-delay:.5s"/>
    <rect class="bar" x="50" y="30" width="18" height="50" fill="#3fb950" rx="3" opacity=".3" style="animation-delay:.7s"/>
    <rect class="bar" x="75" y="10" width="18" height="70" fill="#bc8cff" rx="3" opacity=".35" style="animation-delay:.9s"/>
    <rect class="bar" x="100" y="0" width="18" height="80" fill="#f78166" rx="3" opacity=".3" style="animation-delay:1.1s"/>
    <!-- Trend line over bars -->
    <polyline class="ln" points="9,20 34,5 59,30 84,10 109,0" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
  </g>
  <!-- Title -->
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">By the Numbers</text>
  <!-- Underline growing -->
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="300" begin=".6s" dur="1s" fill="freeze"/></rect>
  <!-- Right side — animated scatter dots -->
  <g transform="translate(900,15)">
    <circle cx="20" cy="50" r="0" fill="#58a6ff" opacity=".4" filter="url(#gl)"><animate attributeName="r" from="0" to="12" begin=".5s" dur=".5s" fill="freeze"/></circle>
    <circle cx="70" cy="25" r="0" fill="#3fb950" opacity=".3" filter="url(#gl)"><animate attributeName="r" from="0" to="8" begin=".8s" dur=".5s" fill="freeze"/></circle>
    <circle cx="120" cy="60" r="0" fill="#bc8cff" opacity=".35" filter="url(#gl)"><animate attributeName="r" from="0" to="15" begin="1.1s" dur=".5s" fill="freeze"/></circle>
    <circle cx="180" cy="35" r="0" fill="#f78166" opacity=".3" filter="url(#gl)"><animate attributeName="r" from="0" to="10" begin="1.4s" dur=".5s" fill="freeze"/></circle>
    <circle cx="240" cy="55" r="0" fill="#58a6ff" opacity=".25" filter="url(#gl)"><animate attributeName="r" from="0" to="6" begin="1.7s" dur=".5s" fill="freeze"/></circle>
  </g>
  <!-- Bottom line with traveling pulse -->
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3s" repeatCount="indefinite"/></rect>
</svg>
