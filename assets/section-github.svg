<svg xmlns="http://www.w3.org/2000/svg" width="800" height="50" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes bd{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
    @keyframes cd{0%{opacity:0;r:0}100%{opacity:1;r:3}}
    @keyframes ti{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    .gt{animation:ti .6s ease-out .2s both;font-family:'SF Mono','Fira Code',monospace}
    .br{stroke-dasharray:60;stroke-dashoffset:60;animation:bd 1.5s ease-out forwards}
  </style>
  <!-- Git branch diagram -->
  <g transform="translate(5,6)">
    <!-- Main branch -->
    <line class="br" x1="5" y1="20" x2="45" y2="20" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
    <!-- Feature branch -->
    <path class="br" d="M15,20 Q20,8 30,8" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" style="animation-delay:.5s"/>
    <path class="br" d="M30,8 Q38,8 38,20" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" style="animation-delay:.8s"/>
    <!-- Commit dots -->
    <circle cx="5" cy="20" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="3" begin=".3s" dur=".3s" fill="freeze"/></circle>
    <circle cx="15" cy="20" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="2.5" begin=".6s" dur=".3s" fill="freeze"/></circle>
    <circle cx="30" cy="8" r="0" fill="#3fb950" filter="url(#gl)"><animate attributeName="r" from="0" to="2.5" begin="1s" dur=".3s" fill="freeze"/></circle>
    <circle cx="38" cy="20" r="0" fill="#bc8cff" filter="url(#gl)"><animate attributeName="r" from="0" to="3" begin="1.5s" dur=".3s" fill="freeze"/></circle>
    <circle cx="45" cy="20" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="3" begin="1.8s" dur=".3s" fill="freeze"/></circle>
  </g>
  <text class="gt" x="60" y="32" font-size="16" fill="#e6edf3" font-weight="600">GitHub</text>
  <rect x="60" y="40" width="0" height="1.5" fill="url(#a)" rx=".75"><animate attributeName="width" from="0" to="65" begin=".4s" dur=".6s" fill="freeze"/></rect>
  <rect x="0" y="46" width="800" height="1" fill="url(#a)" opacity=".15"/>
  <rect x="0" y="46" width="100" height="1" fill="url(#p)" opacity=".6" rx=".5"><animate attributeName="x" from="-100" to="800" dur="3.2s" repeatCount="indefinite"/></rect>
</svg>
