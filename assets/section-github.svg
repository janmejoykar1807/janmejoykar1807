<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes bd{0%{stroke-dashoffset:120}100%{stroke-dashoffset:0}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
    .br{stroke-dasharray:120;stroke-dashoffset:120;animation:bd 2s ease-out forwards}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- Git branch diagram — large -->
  <g transform="translate(20,25)">
    <line class="br" x1="10" y1="35" x2="130" y2="35" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"/>
    <path class="br" d="M40,35 Q55,8 80,8" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" style="animation-delay:.6s"/>
    <path class="br" d="M80,8 Q105,8 105,35" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" style="animation-delay:1s"/>
    <circle cx="10" cy="35" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="7" begin=".3s" dur=".4s" fill="freeze"/></circle>
    <circle cx="40" cy="35" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="6" begin=".7s" dur=".4s" fill="freeze"/></circle>
    <circle cx="80" cy="8" r="0" fill="#3fb950" filter="url(#gl)"><animate attributeName="r" from="0" to="6" begin="1.2s" dur=".4s" fill="freeze"/></circle>
    <circle cx="105" cy="35" r="0" fill="#bc8cff" filter="url(#gl)"><animate attributeName="r" from="0" to="8" begin="1.6s" dur=".4s" fill="freeze"/></circle>
    <circle cx="130" cy="35" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="7" begin="2s" dur=".4s" fill="freeze"/></circle>
  </g>
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">GitHub</text>
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="120" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3.2s" repeatCount="indefinite"/></rect>
</svg>
