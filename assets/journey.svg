<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#3fb950"/></linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#3fb950"/><stop offset="100%" style="stop-color:#3fb950;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gls"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes draw{0%{stroke-dashoffset:900}100%{stroke-dashoffset:0}}
    @keyframes pop{0%{r:0;opacity:0}70%{r:10;opacity:1}100%{r:8;opacity:1}}
    @keyframes popSm{0%{r:0;opacity:0}70%{r:7;opacity:1}100%{r:6;opacity:1}}
    @keyframes pulse{0%,100%{r:10;opacity:.8}50%{r:14;opacity:1}}
    @keyframes ring{0%,100%{r:18;opacity:0}50%{r:22;opacity:.3}}
    @keyframes fadeUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes barGrow{0%{width:0}100%{width:var(--w)}}
    @keyframes countUp{0%{opacity:0}100%{opacity:1}}
    .path{stroke-dasharray:900;stroke-dashoffset:900;animation:draw 3s ease-out forwards}
    .node{animation:popSm .5s ease-out both}
    .now{animation:pulse 2s ease-in-out infinite}
    .nowRing{animation:ring 2s ease-in-out infinite}
    .label{animation:fadeUp .5s ease-out both;font-family:'Segoe UI',system-ui,sans-serif}
    .mono{font-family:'SF Mono','Fira Code',monospace}
    .bar{animation:barGrow .8s ease-out both}
  </style>
  <rect width="1200" height="220" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text class="label" x="600" y="28" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#8b949e" letter-spacing="3" style="animation-delay:.1s">THE JOURNEY SO FAR</text>

  <!-- Main timeline path — curved and organic -->
  <path class="path" d="M100,120 C200,120 220,80 320,80 C420,80 400,130 500,110 C580,95 620,60 720,70 C820,80 850,110 920,100 C980,92 1020,65 1100,65" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>

  <!-- Milestone: 2020 — ML Trainee -->
  <circle class="node" cx="100" cy="120" r="6" fill="#484f58" filter="url(#gls)" style="animation-delay:.5s"/>
  <text class="label mono" x="100" y="150" text-anchor="middle" font-size="11" fill="#484f58" style="animation-delay:.6s">2020</text>
  <text class="label" x="100" y="165" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:.7s">ML Trainee</text>

  <!-- Milestone: 2021 — Published + IBM Winner -->
  <circle class="node" cx="320" cy="80" r="6" fill="#f78166" filter="url(#gls)" style="animation-delay:1s"/>
  <text class="label mono" x="320" y="55" text-anchor="middle" font-size="11" fill="#f78166" style="animation-delay:1.1s">2021</text>
  <text class="label" x="320" y="42" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:1.2s">Published · 🏆 IBM</text>

  <!-- Milestone: 2022 — M.S. + Club President -->
  <circle class="node" cx="500" cy="110" r="6" fill="#bc8cff" filter="url(#gls)" style="animation-delay:1.4s"/>
  <text class="label mono" x="500" y="140" text-anchor="middle" font-size="11" fill="#bc8cff" style="animation-delay:1.5s">2022</text>
  <text class="label" x="500" y="155" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:1.6s">M.S. · President</text>

  <!-- Milestone: 2023 — GTA + Group O -->
  <circle class="node" cx="720" cy="70" r="6" fill="#58a6ff" filter="url(#gls)" style="animation-delay:1.8s"/>
  <text class="label mono" x="720" y="50" text-anchor="middle" font-size="11" fill="#58a6ff" style="animation-delay:1.9s">2023</text>
  <text class="label" x="720" y="37" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:2s">GTA · Group O</text>

  <!-- Milestone: 2024 — Speaker + 7x Certified -->
  <circle class="node" cx="920" cy="100" r="6" fill="#58a6ff" filter="url(#gls)" style="animation-delay:2.2s"/>
  <text class="label mono" x="920" y="130" text-anchor="middle" font-size="11" fill="#58a6ff" style="animation-delay:2.3s">2024</text>
  <text class="label" x="920" y="145" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:2.4s">Speaker · 7x Cert</text>

  <!-- NOW — pulsing green node -->
  <circle class="nowRing" cx="1100" cy="65" r="18" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <circle class="now" cx="1100" cy="65" r="10" fill="#3fb950" filter="url(#gl)"/>
  <text class="label mono" x="1100" y="45" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="600" style="animation-delay:2.8s">NOW</text>
  <text class="label" x="1100" y="100" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:2.9s">Data Scientist</text>
  <text class="label" x="1100" y="113" text-anchor="middle" font-size="10" fill="#8b949e" style="animation-delay:3s">$5M+ Impact</text>

  <!-- Bottom stats bar -->
  <g transform="translate(100,185)">
    <text class="label mono" x="0" y="12" font-size="11" fill="#484f58" style="animation-delay:2s">certifications</text>
    <rect x="110" y="2" width="0" height="12" fill="#58a6ff" rx="2" opacity=".4" style="--w:70px;animation-delay:2.2s" class="bar"/>
    <text class="label mono" x="185" y="12" font-size="12" fill="#58a6ff" font-weight="600" style="animation-delay:2.5s">7</text>

    <text class="label mono" x="230" y="12" font-size="11" fill="#484f58" style="animation-delay:2.3s">competitions</text>
    <rect x="340" y="2" width="0" height="12" fill="#f78166" rx="2" opacity=".4" style="--w:50px;animation-delay:2.5s" class="bar"/>
    <text class="label mono" x="395" y="12" font-size="12" fill="#f78166" font-weight="600" style="animation-delay:2.8s">4</text>

    <text class="label mono" x="440" y="12" font-size="11" fill="#484f58" style="animation-delay:2.6s">publications</text>
    <rect x="550" y="2" width="0" height="12" fill="#bc8cff" rx="2" opacity=".4" style="--w:20px;animation-delay:2.8s" class="bar"/>
    <text class="label mono" x="575" y="12" font-size="12" fill="#bc8cff" font-weight="600" style="animation-delay:3.1s">1</text>

    <text class="label mono" x="620" y="12" font-size="11" fill="#484f58" style="animation-delay:2.9s">impact</text>
    <rect x="690" y="2" width="0" height="12" fill="#3fb950" rx="2" opacity=".4" style="--w:90px;animation-delay:3.1s" class="bar"/>
    <text class="label mono" x="785" y="12" font-size="12" fill="#3fb950" font-weight="600" style="animation-delay:3.4s">$5M+</text>
  </g>
</svg>
