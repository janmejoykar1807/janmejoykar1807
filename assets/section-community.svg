<svg xmlns="http://www.w3.org/2000/svg" width="800" height="50" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#f78166"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes hb{0%,100%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(1)}}
    @keyframes np{0%,100%{opacity:.3}50%{opacity:.8}}
    @keyframes ti{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    .cmt{animation:ti .6s ease-out .2s both;font-family:'SF Mono','Fira Code',monospace}
    .hrt{animation:hb 1.5s ease-in-out infinite;transform-origin:22px 20px}
    .pn{animation:np 2.5s ease-in-out infinite}
  </style>
  <!-- People network with heart -->
  <g transform="translate(5,5)">
    <!-- Connection lines -->
    <line x1="10" y1="20" x2="22" y2="15" stroke="#f78166" stroke-width=".8" opacity=".3"/>
    <line x1="22" y1="15" x2="35" y2="20" stroke="#f78166" stroke-width=".8" opacity=".3"/>
    <line x1="10" y1="20" x2="22" y2="30" stroke="#f78166" stroke-width=".8" opacity=".3"/>
    <line x1="35" y1="20" x2="22" y2="30" stroke="#f78166" stroke-width=".8" opacity=".3"/>
    <!-- People nodes -->
    <circle class="pn" cx="10" cy="20" r="3" fill="#58a6ff" filter="url(#gl)" style="animation-delay:0s"/>
    <circle class="pn" cx="35" cy="20" r="3" fill="#3fb950" filter="url(#gl)" style="animation-delay:.5s"/>
    <circle class="pn" cx="22" cy="30" r="2.5" fill="#bc8cff" filter="url(#gl)" style="animation-delay:1s"/>
    <!-- Beating heart in center -->
    <g class="hrt">
      <text x="16" y="22" font-size="12" opacity=".8">❤️</text>
    </g>
  </g>
  <text class="cmt" x="60" y="32" font-size="16" fill="#e6edf3" font-weight="600">Community &amp; Volunteering</text>
  <rect x="60" y="40" width="0" height="1.5" fill="url(#a)" rx=".75"><animate attributeName="width" from="0" to="225" begin=".4s" dur=".6s" fill="freeze"/></rect>
  <rect x="0" y="46" width="800" height="1" fill="url(#a)" opacity=".15"/>
  <rect x="0" y="46" width="100" height="1" fill="url(#p)" opacity=".6" rx=".5"><animate attributeName="x" from="-100" to="800" dur="3s" repeatCount="indefinite"/></rect>
</svg>
