<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#f78166"/><stop offset="100%" style="stop-color:#f78166;stop-opacity:0"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#f78166"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes hb{0%,100%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(1)}}
    @keyframes np{0%,100%{opacity:.2}50%{opacity:.7}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
    .hrt{animation:hb 1.5s ease-in-out infinite;transform-origin:65px 55px}
    .pn{animation:np 2.5s ease-in-out infinite}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- People network — large -->
  <g transform="translate(10,10)">
    <line x1="25" y1="50" x2="65" y2="35" stroke="#f78166" stroke-width="1.5" opacity=".2"/>
    <line x1="65" y1="35" x2="110" y2="50" stroke="#f78166" stroke-width="1.5" opacity=".2"/>
    <line x1="25" y1="50" x2="65" y2="80" stroke="#f78166" stroke-width="1.5" opacity=".2"/>
    <line x1="110" y1="50" x2="65" y2="80" stroke="#f78166" stroke-width="1.5" opacity=".2"/>
    <circle class="pn" cx="25" cy="50" r="8" fill="#58a6ff" filter="url(#gl)" style="animation-delay:0s"/>
    <circle class="pn" cx="110" cy="50" r="8" fill="#3fb950" filter="url(#gl)" style="animation-delay:.5s"/>
    <circle class="pn" cx="65" cy="80" r="7" fill="#bc8cff" filter="url(#gl)" style="animation-delay:1s"/>
    <g class="hrt"><text x="50" y="50" font-size="28">❤️</text></g>
  </g>
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">Community &amp; Volunteering</text>
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="430" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3s" repeatCount="indefinite"/></rect>
</svg>
