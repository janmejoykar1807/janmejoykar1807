<svg xmlns="http://www.w3.org/2000/svg" width="800" height="50" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#f78166"/><stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0"/></linearGradient>
  </defs>
  <style>
    @keyframes sp{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
    @keyframes ti{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes tg{0%,100%{fill:#f78166}50%{fill:#ffd700}}
    .ct{animation:ti .6s ease-out .2s both;font-family:'SF Mono','Fira Code',monospace}
    .sk{animation:sp 2s ease-in-out infinite}
    .tp{animation:tg 3s ease-in-out infinite}
  </style>
  <!-- Trophy icon -->
  <g transform="translate(15,10)">
    <text class="tp" x="0" y="26" font-size="26">🏆</text>
    <!-- Sparkles around trophy -->
    <circle class="sk" cx="30" cy="5" r="1.5" fill="#ffd700" style="animation-delay:0s"/>
    <circle class="sk" cx="35" cy="15" r="1" fill="#ffd700" style="animation-delay:.7s"/>
    <circle class="sk" cx="5" cy="3" r="1" fill="#ffd700" style="animation-delay:1.4s"/>
    <circle class="sk" cx="-2" cy="18" r="1.2" fill="#ffd700" style="animation-delay:2s"/>
  </g>
  <text class="ct" x="60" y="32" font-size="16" fill="#e6edf3" font-weight="600">Competitions</text>
  <rect x="60" y="40" width="0" height="1.5" fill="url(#a)" rx=".75"><animate attributeName="width" from="0" to="120" begin=".4s" dur=".6s" fill="freeze"/></rect>
  <rect x="0" y="46" width="800" height="1" fill="url(#a)" opacity=".15"/>
  <rect x="0" y="46" width="100" height="1" fill="url(#p)" opacity=".6" rx=".5"><animate attributeName="x" from="-100" to="800" dur="2.8s" repeatCount="indefinite"/></rect>
</svg>
