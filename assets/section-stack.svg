<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3fb950;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#3fb950;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes dr{0%{stroke-dashoffset:80}100%{stroke-dashoffset:0}}
    @keyframes np{0%,100%{opacity:.2;r:4}50%{opacity:.7;r:6}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
    .trace{stroke-dasharray:80;stroke-dashoffset:80;animation:dr 1.5s ease-out forwards}
    .nd{animation:np 2.5s ease-in-out infinite}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- Circuit board traces — large -->
  <g transform="translate(30,15)">
    <path class="trace" d="M0,45 L30,45 L45,15 L90,15" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity=".4" stroke-linecap="round" style="animation-delay:0s"/>
    <path class="trace" d="M0,60 L25,60 L50,80 L100,80 L115,50" fill="none" stroke="#3fb950" stroke-width="2.5" opacity=".35" stroke-linecap="round" style="animation-delay:.4s"/>
    <path class="trace" d="M10,90 L40,90 L60,60 L115,60" fill="none" stroke="#bc8cff" stroke-width="2.5" opacity=".35" stroke-linecap="round" style="animation-delay:.8s"/>
    <circle class="nd" cx="90" cy="15" r="5" fill="#58a6ff" filter="url(#gl)"/>
    <circle class="nd" cx="115" cy="50" r="5" fill="#3fb950" filter="url(#gl)" style="animation-delay:1s"/>
    <circle class="nd" cx="115" cy="60" r="4" fill="#bc8cff" filter="url(#gl)" style="animation-delay:2s"/>
  </g>
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">Stack</text>
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="100" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <!-- Right side hexagonal grid pattern -->
  <g transform="translate(850,10)" opacity=".15">
    <polygon points="30,0 60,17 60,52 30,70 0,52 0,17" fill="none" stroke="#58a6ff" stroke-width="1.5"><animate attributeName="opacity" from="0" to="1" begin=".5s" dur=".5s" fill="freeze"/></polygon>
    <polygon points="90,0 120,17 120,52 90,70 60,52 60,17" fill="none" stroke="#3fb950" stroke-width="1.5"><animate attributeName="opacity" from="0" to="1" begin=".8s" dur=".5s" fill="freeze"/></polygon>
    <polygon points="150,0 180,17 180,52 150,70 120,52 120,17" fill="none" stroke="#bc8cff" stroke-width="1.5"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur=".5s" fill="freeze"/></polygon>
    <polygon points="210,0 240,17 240,52 210,70 180,52 180,17" fill="none" stroke="#f78166" stroke-width="1.5"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur=".5s" fill="freeze"/></polygon>
    <polygon points="60,50 90,67 90,102 60,120 30,102 30,67" fill="none" stroke="#58a6ff" stroke-width="1"><animate attributeName="opacity" from="0" to=".6" begin="1s" dur=".5s" fill="freeze"/></polygon>
    <polygon points="120,50 150,67 150,102 120,120 90,102 90,67" fill="none" stroke="#3fb950" stroke-width="1"><animate attributeName="opacity" from="0" to=".6" begin="1.3s" dur=".5s" fill="freeze"/></polygon>
  </g>
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3.5s" repeatCount="indefinite"/></rect>
</svg>
