<svg xmlns="http://www.w3.org/2000/svg" width="800" height="50" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#f78166"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes ld{0%{width:0}100%{width:38}}
    @keyframes dp{0%{opacity:0;r:0}100%{opacity:1;r:3}}
    @keyframes ti{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    .wt{animation:ti .6s ease-out .2s both;font-family:'SF Mono','Fira Code',monospace}
  </style>
  <!-- Timeline -->
  <g transform="translate(10,18)">
    <rect x="0" y="6" width="0" height="1.5" fill="#58a6ff" rx=".75" opacity=".5"><animate attributeName="width" from="0" to="40" begin=".3s" dur=".8s" fill="freeze"/></rect>
    <circle cx="0" cy="7" r="0" fill="#f78166" filter="url(#gl)"><animate attributeName="r" from="0" to="3" begin=".3s" dur=".3s" fill="freeze"/><animate attributeName="opacity" from="0" to="1" begin=".3s" dur=".3s" fill="freeze"/></circle>
    <circle cx="13" cy="7" r="0" fill="#bc8cff" filter="url(#gl)"><animate attributeName="r" from="0" to="2.5" begin=".6s" dur=".3s" fill="freeze"/><animate attributeName="opacity" from="0" to="1" begin=".6s" dur=".3s" fill="freeze"/></circle>
    <circle cx="26" cy="7" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="2.5" begin=".9s" dur=".3s" fill="freeze"/><animate attributeName="opacity" from="0" to="1" begin=".9s" dur=".3s" fill="freeze"/></circle>
    <circle cx="40" cy="7" r="0" fill="#3fb950" filter="url(#gl)"><animate attributeName="r" from="0" to="3.5" begin="1.2s" dur=".3s" fill="freeze"/><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur=".3s" fill="freeze"/></circle>
  </g>
  <text class="wt" x="60" y="32" font-size="16" fill="#e6edf3" font-weight="600">Work</text>
  <rect x="60" y="40" width="0" height="1.5" fill="url(#a)" rx=".75"><animate attributeName="width" from="0" to="50" begin=".4s" dur=".6s" fill="freeze"/></rect>
  <rect x="0" y="46" width="800" height="1" fill="url(#a)" opacity=".15"/>
  <rect x="0" y="46" width="100" height="1" fill="url(#p)" opacity=".6" rx=".5"><animate attributeName="x" from="-100" to="800" dur="3s" repeatCount="indefinite"/></rect>
</svg>
