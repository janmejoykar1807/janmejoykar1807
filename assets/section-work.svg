<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/></linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#f78166;stop-opacity:0"/></linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f78166;stop-opacity:0"/><stop offset="50%" style="stop-color:#f78166"/><stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
    .title{animation:fu .8s ease-out .2s both;font-family:'Segoe UI',system-ui,sans-serif}
  </style>
  <rect width="1200" height="120" fill="url(#bg)"/>
  <!-- Large timeline with milestone dots -->
  <g transform="translate(30,50)">
    <rect x="0" y="8" width="0" height="4" fill="#58a6ff" rx="2" opacity=".3"><animate attributeName="width" from="0" to="130" begin=".3s" dur="1.5s" fill="freeze"/></rect>
    <circle cx="0" cy="10" r="0" fill="#f78166" filter="url(#gl)"><animate attributeName="r" from="0" to="8" begin=".3s" dur=".4s" fill="freeze"/></circle>
    <circle cx="35" cy="10" r="0" fill="#bc8cff" filter="url(#gl)"><animate attributeName="r" from="0" to="6" begin=".7s" dur=".4s" fill="freeze"/></circle>
    <circle cx="70" cy="10" r="0" fill="#58a6ff" filter="url(#gl)"><animate attributeName="r" from="0" to="6" begin="1.1s" dur=".4s" fill="freeze"/></circle>
    <circle cx="105" cy="10" r="0" fill="#3fb950" filter="url(#gl)"><animate attributeName="r" from="0" to="10" begin="1.5s" dur=".4s" fill="freeze"/></circle>
    <!-- Year labels -->
    <text x="0" y="35" font-family="'SF Mono',monospace" font-size="10" fill="#484f58" opacity="0"><animate attributeName="opacity" from="0" to="1" begin=".5s" dur=".3s" fill="freeze"/>2020</text>
    <text x="30" y="35" font-family="'SF Mono',monospace" font-size="10" fill="#484f58" opacity="0"><animate attributeName="opacity" from="0" to="1" begin=".9s" dur=".3s" fill="freeze"/>2022</text>
    <text x="65" y="35" font-family="'SF Mono',monospace" font-size="10" fill="#484f58" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.3s" dur=".3s" fill="freeze"/>2023</text>
    <text x="97" y="35" font-family="'SF Mono',monospace" font-size="11" fill="#3fb950" font-weight="600" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.7s" dur=".3s" fill="freeze"/>NOW</text>
  </g>
  <text class="title" x="190" y="72" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">Work</text>
  <rect x="190" y="85" width="0" height="3" fill="url(#ac)" rx="1.5"><animate attributeName="width" from="0" to="90" begin=".6s" dur=".8s" fill="freeze"/></rect>
  <rect x="0" y="116" width="1200" height="2" fill="url(#ac)" opacity=".2"/>
  <rect x="0" y="116" width="200" height="2" fill="url(#pulse)" opacity=".7" rx="1"><animate attributeName="x" from="-200" to="1200" dur="3s" repeatCount="indefinite"/></rect>
</svg>
