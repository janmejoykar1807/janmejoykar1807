name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:        # manual trigger anytime

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    name: Generate stats SVG and commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: janmejoykar1807
          OUTPUT_PATH: assets/stats.svg
        run: python generate_stats.py

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          if git diff --staged --quiet; then
            echo "No changes to stats SVG — skipping commit"
          else
            git commit -m "chore: auto-update stats SVG [$(date +%Y-%m-%d)]"
            git push
            echo "Stats SVG pushed successfully"
          fi
